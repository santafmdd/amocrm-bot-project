[pytest]
testpaths = tests
norecursedirs =
    .venv
    exports
    workspace
    logs
    __pycache__
    .pytest_cache
addopts =
    --ignore=exports
    --ignore=workspace
    --ignore=logs
    --ignore=test_google_sheets_api.py
    --ignore-glob=tests/tmp*
    --ignore-glob=exports/tmp*
    --ignore-glob=pytest-cache-files-*
