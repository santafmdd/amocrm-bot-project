[pytest]
testpaths = tests
norecursedirs =
    .venv
    exports
    workspace
    logs
    __pycache__
    .pytest_cache
    tmp*
    pytest-cache-files-*
addopts =
    --ignore=test_google_sheets_api.py
    --ignore-glob=exports/tmp*
    --ignore-glob=pytest-cache-files-*
    --ignore-glob=tests/tmp*
